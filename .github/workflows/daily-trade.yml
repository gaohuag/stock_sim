name: 模拟炒股系统每日运行

on:
  schedule:
    # 每个交易日 09:25 和 15:05 运行（UTC时间，北京时间-8小时）
    - cron: '25 1 * * 1-5'
    - cron: '5 7 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-simulator:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行模拟交易系统
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          cd stock_sim
          python3.11 simulator.py

      - name: 提交更新后的持仓文件
        run: |
          git config user.email "trader@ai.com"
          git config user.name "AI Trader"
          git add stock_sim/portfolio.json stock_sim/trades.log stock_sim/report.html
          git diff --cached --quiet || git commit -m "chore: 更新持仓 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
